<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <title>Endless Moto Ramp Run</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game-shell">
      <header class="game-header">
        <h1>Endless Moto Ramp Run</h1>
        <p class="hint">Управление: ← / → / A / D — смена полосы. R — рестарт.</p>
      </header>
      <canvas id="game" width="540" height="960" aria-label="Игра с мотоциклом и трамплинами"></canvas>
      <div class="touch-controls" aria-label="Мобильное управление">
        <button id="btn-left" type="button" aria-label="Влево">◀</button>
        <button id="btn-right" type="button" aria-label="Вправо">▶</button>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
